<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SocialConnect</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Left Sidebar -->
    <aside class="left-sidebar" id="leftSidebar"></aside>

    <!-- Center Feed -->
    <main class="feed-center">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-cover"></div>
        <div class="profile-info-section">
          <div class="profile-avatar-wrap">
            <img src="avatar1.jpg" alt="Profile" id="profileAvatar">
            <div id="profileActions">
              <button class="btn-outline" onclick="editProfile()">Edit Profile</button>
            </div>
          </div>
          <div class="profile-name" id="profileName">User Name</div>
          <div class="profile-handle" id="profileHandle">@username</div>
          <div class="profile-bio" id="profileBio">No bio yet.</div>
          <div class="profile-stats">
            <span><strong id="profileFollowing">0</strong> Following</span>
            <span><strong id="profileFollowers">0</strong> Followers</span>
          </div>
          <div class="profile-tabs">
            <button class="profile-tab active">Posts</button>
            <button class="profile-tab">Replies</button>
            <button class="profile-tab">Likes</button>
          </div>
        </div>
      </div>

      <!-- User Posts -->
      <div id="profilePosts"></div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="rightSidebar"></aside>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <script src="script.js"></script>
</body>
</html>
