<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SocialConnect</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <!-- Main Container -->
  <div class="main-container auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="logo.png" alt="SocialConnect" style="width:48px;height:48px;">
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Login to your SocialConnect account</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn-primary auth-btn">Log in</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up</a>
      </div>

      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center;">
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">Demo accounts (password: demo123)</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
          <button class="btn-outline" style="font-size:12px;padding:4px 12px;" onclick="fillDemo('sarah@demo.com')">sarah@demo.com</button>
          <button class="btn-outline" style="font-size:12px;padding:4px 12px;" onclick="fillDemo('marcus@demo.com')">marcus@demo.com</button>
          <button class="btn-outline" style="font-size:12px;padding:4px 12px;" onclick="fillDemo('emily@demo.com')">emily@demo.com</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function fillDemo(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = 'demo123';
      document.getElementById('loginError').classList.remove('show');
    }
  </script>
</body>
</html>
