<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialConnect - Home</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Left Sidebar -->
    <aside class="left-sidebar" id="leftSidebar"></aside>

    <!-- Center Feed -->
    <main class="feed-center">
      <!-- Create Post -->
      <div class="create-post">
        <div class="create-post-inner">
          <img src="" alt="Your avatar" id="createPostAvatar">
          <div class="create-post-input-area">
            <textarea id="postContent" placeholder="What's happening?" rows="2"></textarea>
            <div class="create-post-actions">
              <div class="post-tools">
                <button class="post-tool" title="Add image">
                  <svg viewBox="0 0 24 24" fill="#1da1f2"><path d="M3 5.5C3 4.119 4.119 3 5.5 3h13C19.881 3 21 4.119 21 5.5v13c0 1.381-1.119 2.5-2.5 2.5h-13C4.119 21 3 19.881 3 18.5v-13zM5.5 5c-.276 0-.5.224-.5.5v13c0 .276.224.5.5.5h13c.276 0 .5-.224.5-.5v-13c0-.276-.224-.5-.5-.5h-13zM18 10.5c0 .828-.672 1.5-1.5 1.5s-1.5-.672-1.5-1.5.672-1.5 1.5-1.5 1.5.672 1.5 1.5zM7 16l4-8 3 6 2.5-3 2.5 5H7z"/></svg>
                </button>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="char-count" id="charCount">0</span>
                <button class="btn-primary" id="submitPost" onclick="submitPost()" disabled>Post</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Feed -->
      <div id="feed"></div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="rightSidebar"></aside>
  </div>

  <!-- Post Modal (for sidebar button) -->
  <div class="modal-overlay" id="postModal" onclick="if(event.target===this)closePostModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create Post</h3>
        <button class="modal-close" onclick="closePostModal()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="create-post-inner" style="border:none;">
          <img src="" alt="Your avatar" id="modalPostAvatar" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
          <div class="create-post-input-area" style="border:none;">
            <textarea id="modalPostContent" placeholder="What's happening?" rows="4"></textarea>
            <div class="create-post-actions" style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;">
              <div class="post-tools">
                <button class="post-tool" title="Add image">
                  <svg viewBox="0 0 24 24" fill="#1da1f2"><path d="M3 5.5C3 4.119 4.119 3 5.5 3h13C19.881 3 21 4.119 21 5.5v13c0 1.381-1.119 2.5-2.5 2.5h-13C4.119 21 3 19.881 3 18.5v-13zM5.5 5c-.276 0-.5.224-.5.5v13c0 .276.224.5.5.5h13c.276 0 .5-.224.5-.5v-13c0-.276-.224-.5-.5-.5h-13zM18 10.5c0 .828-.672 1.5-1.5 1.5s-1.5-.672-1.5-1.5.672-1.5 1.5-1.5 1.5.672 1.5 1.5zM7 16l4-8 3 6 2.5-3 2.5 5H7z"/></svg>
                </button>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="char-count" id="modalCharCount">0</span>
                <button class="btn-primary" id="modalSubmitPost" onclick="submitModalPost()" disabled>Post</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <script src="script.js"></script>
  <script>
    // Set avatar for create post
    const user = JSON.parse(localStorage.getItem('sc_current_user'));
    if (user) {
      const avatar1 = document.getElementById('createPostAvatar');
      const avatar2 = document.getElementById('modalPostAvatar');
      if (avatar1) avatar1.src = user.avatar;
      if (avatar2) avatar2.src = user.avatar;
    }
  </script>
</body>
</html>
